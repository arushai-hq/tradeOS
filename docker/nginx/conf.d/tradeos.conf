# TradeOS Nginx — SSL reverse proxy for Zerodha OAuth callback
# Proxies /callback to token_server.py on host (0.0.0.0:7291)
#
# NOTE: We use the VPS public IP (72.62.226.215) instead of host.docker.internal
# because host.docker.internal resolves to the docker0 bridge gateway (172.17.0.1)
# which is not routable from tradeos_network (172.20.0.0/16). The VPS public IP
# is reachable from any Docker network and token_server.py binds to 0.0.0.0.

server {
    listen 443 ssl;
    server_name srv1332119.hstgr.cloud;

    ssl_certificate     /etc/letsencrypt/live/srv1332119.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1332119.hstgr.cloud/privkey.pem;

    # Zerodha OAuth callback → token_server.py on host (VPS public IP)
    location /callback {
        proxy_pass http://72.62.226.215:7291;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Block everything else
    location / {
        return 444;
    }
}

server {
    listen 80;
    server_name srv1332119.hstgr.cloud;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host:11443$request_uri;
    }
}

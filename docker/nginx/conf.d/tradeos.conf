# TradeOS Nginx — SSL reverse proxy for Zerodha OAuth callback
# Proxies /callback to token_server.py on host (localhost:7291)

server {
    listen 443 ssl;
    server_name srv1332119.hstgr.cloud;

    ssl_certificate     /etc/letsencrypt/live/srv1332119.hstgr.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/srv1332119.hstgr.cloud/privkey.pem;

    # Zerodha OAuth callback → token_server.py on host
    location /callback {
        proxy_pass http://host.docker.internal:7291;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Block everything else
    location / {
        return 444;
    }
}

server {
    listen 80;
    server_name srv1332119.hstgr.cloud;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host:11443$request_uri;
    }
}

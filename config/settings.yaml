# TradeOS Configuration
# DO NOT commit secrets.yaml — use .env for API keys

system:
  mode: paper          # paper | live
  broker: zerodha
  exchange: NSE
  timezone: Asia/Kolkata

database:
  dsn: "postgresql://tradeos:tradeos@localhost:5432/tradeos"  # Update with your DSN

capital:
  total: 1000000       # ₹10L
  # RULE: All allocations MUST sum to 1.00 (100%). Validated at startup.
  allocation:
    s1_intraday: 0.90
    s2_swing: 0.05
    s3_positional: 0.03
    s4_event: 0.02

risk:
  max_loss_per_trade_pct: 0.015
  max_daily_loss_pct: 0.03
  max_open_positions: 6
  hard_exit_time: "15:00"

# Slot-based position sizing
position_sizing:
  min_slot_capital: 40000     # ₹40,000 — system refuses to start if slot capital < this
  min_risk_floor: 1000        # ₹1,000 — reject if actual risk per trade < this
  min_position_value: 15000   # ₹15,000 — reject if position value < this

strategy:
  s1:
    # Signal generation
    ema_fast: 9                # Fast EMA period
    ema_slow: 21               # Slow EMA period
    rsi_period: 14             # RSI calculation period
    rsi_long_min: 55           # Minimum RSI for LONG signals
    rsi_long_max: 70           # Maximum RSI for LONG signals
    rsi_short_min: 45          # Minimum RSI for SHORT signals (B3 fix)
    volume_ratio_min: 1.2      # Minimum volume ratio
    rr_ratio: 2.0              # Risk-reward ratio for target calculation
    swing_lookback: 5          # Candles for swing high/low
    min_stop_pct: 0.02         # 2.0% minimum stop distance from entry

trading_hours:
  market_open: "09:15"
  market_close: "15:30"
  intraday_exit: "15:00"
  no_entry_after: "14:45"   # No new entries after this time (IST). Existing positions unaffected.


# TradeOS Configuration
# DO NOT commit secrets.yaml — use .env for API keys

system:
  mode: paper          # paper | live
  broker: zerodha
  exchange: NSE
  timezone: Asia/Kolkata

database:
  dsn: "postgresql://tradeos:tradeos@localhost:5432/tradeos"  # Update with your DSN

capital:
  total: 1000000       # ₹10L
  # RULE: All allocations MUST sum to 1.00 (100%). Validated at startup.
  allocation:
    s1_intraday: 0.90
    s2_swing: 0.05
    s3_positional: 0.03
    s4_event: 0.02

risk:
  max_loss_per_trade_pct: 0.015
  max_daily_loss_pct: 0.03
  max_open_positions: 6
  hard_exit_time: "15:00"

# Slot-based position sizing
position_sizing:
  min_slot_capital: 40000     # ₹40,000 — system refuses to start if slot capital < this
  min_risk_floor: 1000        # ₹1,000 — reject if actual risk per trade < this
  min_position_value: 15000   # ₹15,000 — reject if position value < this

strategy:
  s1:
    # Signal generation
    ema_fast: 9                # Fast EMA period
    ema_slow: 21               # Slow EMA period
    rsi_period: 14             # RSI calculation period
    rsi_long_min: 55           # Minimum RSI for LONG signals
    rsi_long_max: 70           # Maximum RSI for LONG signals
    rsi_short_min: 45          # Minimum RSI for SHORT signals (B3 fix)
    volume_ratio_min: 1.2      # Minimum volume ratio
    rr_ratio: 2.0              # Risk-reward ratio for target calculation
    swing_lookback: 5          # Candles for swing high/low
    min_stop_pct: 0.02         # 2.0% minimum stop distance from entry

  s1v2:
    timeframe_mode: single      # 'single' = all on 15min, 'multi' = 15min trend + 5min entry
    ema_trend_period: 10        # Directional filter EMA (15min)
    ema_pullback_period: 20     # Pullback detection EMA (5min in multi, 15min in single)
    adx_period: 14              # ADX period (15min)
    adx_threshold: 25           # Trend confirmation threshold
    atr_period: 14              # ATR for target calc (5min in multi, 15min in single)
    atr_target_mult: 2.5        # Target = entry ± 2.5×ATR
    atr_stop_floor_mult: 1.0    # Minimum stop distance = 1.0 × ATR(14)
    volume_ratio_min: 1.5       # Trigger bar vol / SMA(20) threshold
    volume_sma_period: 20       # Volume SMA lookback
    rr_min: 3.0                 # Minimum risk:reward ratio
    time_stop_bars: 30          # Max bars in trade — multi mode (5min = 150min)
    time_stop_bars_15min: 20    # Max bars in trade — single mode (15min = 300min)

  s1v3:
    interval: "5min"            # Candle interval: "5min" or "15min"
    # Time window (IST)
    signal_start: "09:30"       # No signals before this (open noise)
    signal_end: "14:30"         # No signals after this (not enough time for reversion)
    # Panic detection
    atr_period: 14              # ATR period (15min)
    panic_atr_multiplier: 2.0   # Drop must exceed 2×ATR relative to day_high
    # Oversold/overbought confirmation
    rsi_period: 14              # RSI period (15min)
    rsi_oversold: 30            # LONG: RSI must be below this
    rsi_overbought: 70          # SHORT: RSI must be above this
    bb_period: 20               # Bollinger Band SMA period
    bb_std: 2.0                 # Bollinger Band standard deviations
    # Volume confirmation
    volume_ratio_min: 1.5       # Reversal bar vol / SMA(20) threshold
    volume_sma_period: 20       # Volume SMA lookback
    # Risk:Reward
    min_rr_ratio: 2.0           # Minimum R:R to accept trade
    # Reversal timeout
    reversal_timeout_bars: 5    # Cancel panic setup if no reversal within 5 bars (75min)

# Backtester-specific overrides (live trading ignores this section)
backtester:
  min_risk_floor: 200          # ₹200 — covers round-trip commission. Live uses ₹1,000.

trading_hours:
  market_open: "09:15"
  market_close: "15:30"
  intraday_exit: "15:00"
  no_entry_after: "14:45"   # No new entries after this time (IST). Existing positions unaffected.


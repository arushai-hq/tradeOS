# Futures configuration — NIFTY/BANKNIFTY index futures (NFO)
futures:
  instruments:
    - name: NIFTY
      lot_size: 65
      tradingsymbol_prefix: "NIFTY"
      exclude_prefixes: ["NIFTYIT", "NIFTYNXT50", "FINNIFTY", "MIDCPNIFTY"]
    - name: BANKNIFTY
      lot_size: 30
      tradingsymbol_prefix: "BANKNIFTY"
      exclude_prefixes: []
  download:
    intervals: ["5min", "15min", "day"]
    lookback_months: 18
    oi: true
    continuous: true
  backtest:
    initial_capital: 1000000       # ₹10L
    margin_rate: 0.12              # NRML margin (conservative)
    risk_per_trade_pct: 0.015      # 1.5% of available capital
    max_positions: 1               # Single instrument, 1 position at a time
    no_entry_after: "14:45"
    hard_exit_time: "15:10"
    reward_ratio: 2.0
    slippage: 0.001
    default_interval: "15min"
  strategies:
    s1v2:
      timeframe_mode: "single"     # single (15min only) or multi (5min+15min)
      ema_fast: 10
      ema_slow: 20
      adx_threshold: 15            # Index ADX reads structurally lower (components cancel)
      pullback_candles: 3
      atr_period: 14
      atr_stop_multiplier: 1.5
      volume_ratio_min: 1.2        # Index volume is smoother than single stocks
      rr_min: 2.0                  # 2R achievable intraday on index; 3R too ambitious
    s1v3:
      interval: "15min"
      rsi_period: 14
      rsi_oversold: 35             # Index RSI rarely hits 30 on 15min
      rsi_overbought: 65           # Index RSI rarely hits 70 on 15min
      bb_period: 20
      bb_std: 2.0
      panic_atr_multiplier: 1.5    # Index panic moves smaller than single stocks
    orb:
      range_minutes: 30              # 15 = 09:30 end, 30 = 09:45 end (was 15)
      min_range_pct: 0.0015          # Skip if range < 0.15% of price
      max_range_pct: 0.008           # Skip if range > 0.80% of price (was 0.006)
      volume_ratio_min: 1.5          # Breakout vol / SMA(20) (was 1.2)
      stop_mode: "range_end"         # "range_end" or "midpoint"
      target_multiplier: 1.5         # Target = range_width × this
      no_entry_after: "14:00"
      max_trades_per_day: 1
    vwap_mr:
      band_mult: 2.0                 # VWAP ± N×SD
      rsi_period: 14
      rsi_overbought: 65
      rsi_oversold: 35
      adx_period: 14
      adx_max_threshold: 25          # Suppress signals when ADX >= this
      atr_period: 14
      atr_stop_mult: 0.5             # Stop = 0.5 × ATR beyond entry
      min_distance_pct: 0.003        # Min distance from VWAP as fraction
      no_entry_after: "14:30"
      max_trades_per_day: 3
    macd_st:
      st_daily_period: 10            # Daily Supertrend period
      st_daily_multiplier: 3.0       # Daily Supertrend multiplier
      macd_fast: 12
      macd_slow: 26
      macd_signal: 9
      ema_trend_period: 50           # 50-EMA trend filter
      st_intraday_period: 10         # Intraday Supertrend (for stop)
      st_intraday_multiplier: 2.0
      atr_period: 14
      atr_target_mult: 2.5           # Target = entry ± 2.5×ATR
      exit_mode: "supertrend_trail"  # "fixed" or "supertrend_trail"
      no_entry_after: "14:00"
      max_trades_per_day: 2

# Token automation — daily Zerodha token refresh
token_automation:
  server:
    port: 7291
    timeout_hours: 2              # Auto-shutdown if no callback
  cron:
    first_send: "07:00"           # IST — initial login link (VPS clock is IST)
    reminders:                    # IST — escalation messages
      - "07:30"
      - "08:00"
    final_warning: "08:30"        # IST — last warning
    deadline: "08:45"             # IST — kill server, session missed
    check_interval_seconds: 30    # Polling interval for signal file
  auto_start:
    enabled: true                 # Set false to disable main.py auto-start
    weekdays_only: true           # Skip auto-start on Sat/Sun
    tradeos_dir: "/opt/tradeOS"   # Base directory
    tmux_session_name: "tradeos"  # tmux session name

# Log rotation — compress old files, delete archives
log_rotation:
  compress_after_days: 30    # .log files older than this → .gz
  delete_after_days: 90      # .gz files older than this → delete

# TradeOS — Secrets Template
# Copy to config/secrets.yaml and fill in actual values.
# NEVER commit secrets.yaml to git.

zerodha:
  api_key: "your_kiteconnect_api_key"
  api_secret: "your_kiteconnect_api_secret"
  access_token: ""          # Auto-populated by token_server.py
  token_date: ""             # Auto-populated by token_server.py (YYYY-MM-DD)

telegram:
  trading:
    bot_token: "your_telegram_bot_token"
    chat_id: "your_telegram_chat_id"
  hawk:
    bot_token: "your_hawk_bot_token"
    chat_id: "your_hawk_chat_id"

# HAWK AI Engine (OpenRouter)
openrouter:
  api_key: "your_openrouter_api_key"

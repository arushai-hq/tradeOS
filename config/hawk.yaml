hawk:
  # Model ID — used for single-model mode (consensus disabled or --single flag)
  #   Anthropic:   claude-sonnet-4-20250514, claude-haiku-4-5-20251001
  #   OpenRouter:  anthropic/claude-sonnet-4, openai/gpt-4o, google/gemini-2.0-flash
  model: "anthropic/claude-sonnet-4"
  max_tokens: 10000
  watchlist_size: 15          # Number of stocks to recommend
  nifty50_source: "nsetools"  # nsetools or hardcoded
  delivery_threshold: 1.5     # Unusual delivery = this x 20-day avg
  output_dir: "logs/hawk"
  db_enabled: false           # TimescaleDB storage (enable later)

  # Multi-model consensus mode
  # When enabled, all models below are queried via OpenRouter and picks are
  # combined into a scored consensus (UNANIMOUS / STRONG / MAJORITY / SINGLE).
  # Override at CLI: --consensus (force on) or --single (force off).
  consensus:
    enabled: true
    models:
      - id: "anthropic/claude-sonnet-4"
        name: "Claude"
      - id: "google/gemini-3.1-pro-preview"
        name: "Gemini"
      - id: "openai/gpt-5.4"
        name: "GPT-5.4"
      - id: "moonshotai/kimi-k2.5"
        name: "Kimi"
